<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Jhonatas ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="hearts"></div>

<section class="hero">

    <img src="imagens/foto1.jpg" class="fotoPrincipal">

    <h1>Jhonatas ❤️</h1>

    <p>
        Este site foi feito especialmente para você.
    </p>

    <button id="btnMensagem">
        Clique aqui ❤️
    </button>

</section>

<section id="mensagem" class="hidden">

    <h2>Meu Amor</h2>

    <p>
        Desde que você entrou na minha vida,
        tudo ficou mais bonito.
        Obrigada por existir e por fazer parte da minha história.

        Eu te amo infinitamente ❤️
    </p>

</section>

<section class="galeria">

    <h2>Nossos Momentos</h2>

    <div class="fotos">

        <img src="imagens/foto1.jpg">
        <img src="imagens/foto2.jpg">
        <img src="imagens/foto3.jpg">
        <img src="imagens/foto4.jpg">

    </div>

</section>

<footer>

    Feito com muito amor ❤️

</footer>

<audio id="musica" loop>
    <source src="audio/musica.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
